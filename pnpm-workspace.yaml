catalogMode: prefer
ignoreScripts: true
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@napi-rs/*'
  - '@nkzw/*'
  - '@oxc-node/*'
  - '@oxc-minify/*'
  - '@oxc-parser/*'
  - '@oxc-project/*'
  - '@oxc-resolver/*'
  - '@oxc-transform/*'
  - '@oxfmt/*'
  - '@oxlint-tsgolint/*'
  - '@oxlint/*'
  - '@rolldown/*'
  - '@tsdown/*'
  - '@types/*'
  - '@vitejs/*'
  - '@vitest/*'
  - '@voidzero-dev/*'
  - oxc-minify
  - oxc-parser
  - oxc-transform
  - oxfmt
  - oxlint
  - oxlint-tsgolint
  - lightningcss
  - lightningcss-*
  - baseline-browser-mapping
  - devframe
  - import-without-cache
  - logs-sdk
  - rolldown
  - rolldown-plugin-dts
  - tsdown
  - unrun
  - vite
  - vitepress
  - vitest
  - vue-virtual-scroller
  - lodash-es@4.18.1
overrides:
  '@rolldown/pluginutils': workspace:@rolldown/pluginutils@*
  rolldown: workspace:rolldown@*
  vite: workspace:@voidzero-dev/vite-plus-core@*
  vitest: workspace:@voidzero-dev/vite-plus-test@*
  vitest-dev: npm:vitest@^4.1.5
packageExtensions:
  sass-embedded:
    peerDependencies:
      source-map-js: '*'
    peerDependenciesMeta:
      source-map-js:
        optional: true
  '@rollup/plugin-dynamic-import-vars':
    dependencies:
      '@types/estree': ^1.0.0
patchedDependencies:
  sirv@3.0.2: vite/patches/sirv@3.0.2.patch
  chokidar@3.6.0: vite/patches/chokidar@3.6.0.patch
  dotenv-expand@13.0.0: vite/patches/dotenv-expand@13.0.0.patch
peerDependencyRules:
  allowAny:
    - vite
    - vitest
    - rolldown
  allowedVersions:
    oxc-minify: '*'
    oxlint-tsgolint: '*'
    rolldown: '*'
    vite: '*'
